<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.1/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock - Someleze Sipayile</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a City</option>
        <option value="new-york">New York</option>
        <option value="london">London</option>
        <option value="tokyo">Tokyo</option>
      </select>

      <div class="city" id="pretoria">
        <div>
          <h2>Pretoria </h2>
          <div class="date" id="pretoria-date"></div>
        </div>

        <div class="time" id="pretoria-time"></div>
      </div>

      <div class="city" id="los-angeles">
        <div>
          <h2>Los Angeles</h2>
          <div class="date" id="los-angeles-date"></div>
        </div>

        <div class="time" id="los-angeles-time"></div>
      </div>

      <div class="city" id="paris">
        <div>
          <h2>Paris</h2>
          <div class="date" id="paris-date"></div>
        </div>

        <div class="time" id="paris-time"></div>
      </div>
    </div>
    <footer>
      This project was coded by <strong>Someleze Sipayile❤️</strong> and is
      <a href="https://github.com/somiie/World-Clock" target="_blank"
        >open sourced on GitHub</a
      >
    </footer>
    <script src="Javascript/index.js"></script>
  </body>
</html>
