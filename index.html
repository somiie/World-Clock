<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock - Someleze Sipayile</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a City</option>
        <option value="new-york">New York</option>
        <option value="london">London</option>
        <option value="tokyo">Tokyo</option>
      </select>

      <div class="city">
        <div>
          <h2>Los Angeles</h2>
          <div class="date" id="los-angeles-date">July 30th, 2026</div>
        </div>

        <div class="time" id="los-angeles-time">1:48:15 <small>AM</small></div>
      </div>

      <div class="city">
        <div>
          <h2>Paris</h2>
          <div class="date" id="paris-date">July 30th, 2026</div>
        </div>

        <div class="time" id="paris-time">1:48:15 <small>AM</small></div>
      </div>
    </div>
    <footer>
      This project was coded by <strong>Someleze Sipayile❤</strong> and is
      <a href="https://github.com/somiie/World-Clock" target="_blank"
        >open sourced on GitHub</a
      >
    </footer>
    <script src="Javascript/index.js"></script>
  </body>
</html>
